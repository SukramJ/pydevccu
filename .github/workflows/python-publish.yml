---
name: "Release: Publish to PyPI"

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: python-publish-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release-build:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    name: Build Package (${{ github.ref_name }})
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
          ls -l dist/

      - name: Upload built distributions as artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  github-release:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    name: Create GitHub Release (${{ github.ref_name }})
    needs: [release-build]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract section between "Version X.Y.Z" and next "Version" line
          NOTES=$(awk "/^Version ${VERSION//./\\.} /{found=1; next} \
            /^Version /{found=0} found" changelog.txt)
          # Write to file for multiline support
          echo "$NOTES" > release_notes.txt
          echo "Found release notes for version $VERSION"

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Create GitHub Release
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.txt
          files: dist/*

  pypi-publish:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    name: Publish to PyPI (${{ github.ref_name }})
    needs: [release-build]
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/
