---
name: "Release: Publish to PyPI"

# yamllint disable-line rule:truthy
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: python-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  release-build:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    name: Build Package (${{ github.event.release.tag_name }})
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
          ls -l dist/

      - name: Upload built distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    if: github.repository_owner == 'SukramJ'
    runs-on: ubuntu-latest
    name: Publish to PyPI (${{ github.event.release.tag_name }})
    needs: [release-build]
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
