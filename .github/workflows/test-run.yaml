---
name: "Test-Run"

# yamllint disable-line rule:truthy
on:
  pull_request: ~
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.14t (free-threaded) uses stdlib json via compat module
        # since orjson does not yet support free-threading.
        python-version: ["3.13", "3.14", "3.14t"]
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          pip install -e ".[test]"

      - name: Install orjson (non-free-threaded only)
        if: matrix.python-version != '3.14t'
        run: pip install orjson>=3.11.0

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=pydevccu --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
